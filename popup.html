<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatChart - بیٹ چارٹ</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>بیٹ چارٹ</h1>
            <div class="header-controls">
                <button id="addBeatBtn" class="icon-btn" title="نیا بیٹ شامل کریں" aria-label="Add beat">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                </button>
                <button id="themeToggle" class="icon-btn" title="تھیم تبدیل کریں" aria-label="Toggle theme">
                    <svg class="theme-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
                    </svg>
                </button>
            </div>
        </header>

        <div class="search-section">
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
                    <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="searchInput" placeholder="گاؤں، بیٹ، یا افسر تلاش کریں..." autocomplete="off">
                <button id="clearSearch" class="clear-btn hidden" aria-label="Clear search">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
        </div>

        <nav class="filter-tabs" role="tablist">
            <button class="tab-btn active" data-filter="all" role="tab" aria-selected="true">سب</button>
            <button class="tab-btn" data-filter="beat" role="tab" aria-selected="false">بیٹ</button>
            <button class="tab-btn" data-filter="officer" role="tab" aria-selected="false">افسران</button>
            <button class="tab-btn" data-filter="village" role="tab" aria-selected="false">گاؤں</button>
        </nav>

        <div id="loadingState" class="state-container hidden">
            <div class="spinner"></div>
            <p>ڈیٹا لوڈ ہو رہا ہے...</p>
        </div>

        <div id="errorState" class="state-container hidden">
            <svg viewBox="0 0 24 24" width="48" height="48" class="error-icon">
                <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            <p>ڈیٹا لوڈ کرنے میں خرابی</p>
            <button id="retryBtn" class="retry-btn">دوبارہ کوشش کریں</button>
        </div>

        <div id="emptyState" class="state-container hidden">
            <svg viewBox="0 0 24 24" width="48" height="48" class="empty-icon">
                <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <p>کوئی نتیجہ نہیں ملا</p>
        </div>

        <main id="resultsContainer" class="results-container" role="main"></main>

        <footer class="app-footer">
            <div class="footer-actions">
                <button id="exportBtn" class="footer-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                    </svg>
                    ایکسپورٹ
                </button>
                <button id="importBtn" class="footer-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path fill="currentColor" d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
                    </svg>
                    امپورٹ
                </button>
                <input type="file" id="importFileInput" accept=".json" class="hidden">
            </div>
            <span id="resultCount" class="result-count"></span>
        </footer>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal" role="dialog" aria-modal="true">
            <div class="modal-header">
                <h2 id="modalTitle">نیا بیٹ شامل کریں</h2>
                <button id="modalClose" class="modal-close" aria-label="Close">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="beatForm">
                    <input type="hidden" id="editIndex" value="-1">

                    <div class="form-group">
                        <label for="beatName">بیٹ کا نام</label>
                        <input type="text" id="beatName" required placeholder="بیٹ نام درج کریں">
                    </div>

                    <div class="form-group">
                        <label>افسران</label>
                        <div id="officersContainer" class="dynamic-list"></div>
                        <button type="button" id="addOfficerBtn" class="add-item-btn">
                            <svg viewBox="0 0 24 24" width="14" height="14">
                                <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                            </svg>
                            افسر شامل کریں
                        </button>
                    </div>

                    <div class="form-group">
                        <label>گاؤں</label>
                        <div id="villagesContainer" class="dynamic-list"></div>
                        <button type="button" id="addVillageBtn" class="add-item-btn">
                            <svg viewBox="0 0 24 24" width="14" height="14">
                                <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                            </svg>
                            گاؤں شامل کریں
                        </button>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="cancelModalBtn" class="btn btn-secondary">منسوخ</button>
                <button type="button" id="saveModalBtn" class="btn btn-primary">محفوظ کریں</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
